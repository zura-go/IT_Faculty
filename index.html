<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT-ის ფაკულტეტი - სპეციალიზაციები</title>
    <style>
        :root {
            --primary-color: #1e3a8a;
            --secondary-color: #3b82f6;
            --accent-color: #10b981;
            --bg-color: #f8fafc;
            --text-color: #1e293b;
            --card-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 20px;
        }

        header h1 {
            color: var(--primary-color);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        header .slogan {
            color: var(--secondary-color);
            font-size: 1.3rem;
            font-weight: 600;
            font-style: italic;
        }

        .selection-zone {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .selection-zone {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: #f1f5f9;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }

        .panel h3 {
            color: var(--primary-color);
            margin-bottom: 15px;
            font-size: 1.1rem;
            border-bottom: 1px solid #cbd5e1;
            padding-bottom: 8px;
        }

        .all-toggle {
            margin-bottom: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
            background: white;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.2s;
        }

        .checkbox-item:hover {
            border-color: var(--secondary-color);
            background: #f8fafc;
        }

        /* Tooltip-ის სტილები მოკლე სახელებისთვის */
        .tooltip {
            position: relative;
            display: inline-block;
            font-weight: 600;
            color: var(--primary-color);
        }

        .tooltip .tooltiptext {
            visibility: hidden;
            width: 280px;
            background-color: #334155;
            color: #fff;
            text-align: left;
            border-radius: 6px;
            padding: 10px;
            position: absolute;
            z-index: 10;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.3s;
            font-size: 0.85rem;
            font-weight: normal;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            pointer-events: none;
        }

        .checkbox-item:hover .tooltiptext,
        .tooltip:hover .tooltiptext {
            visibility: visible;
            opacity: 1;
        }

        .action-zone {
            text-align: center;
            margin-top: 20px;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: var(--secondary-color);
        }

        /* პრიორიტეტის მოდალური ფანჯარა */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .modal-content h4 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: var(--text-color);
        }

        .modal-btns {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn-alt {
            background-color: #64748b;
        }
        .btn-alt:hover {
            background-color: #475569;
        }

        /* საპრეზენტაციო ხედის ზონა */
        .presentation-zone {
            display: none;
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .view-card {
            background: #ffffff;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            min-height: 250px;
            max-height: 70vh;
            overflow-y: auto;
        }

        .view-title-box {
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f1f5f9;
        }

        .view-title-short {
            font-size: 1.5rem;
            color: var(--primary-color);
            cursor: pointer;
            display: inline-block;
            border-bottom: 1px dashed var(--secondary-color);
        }

        .view-content-text {
            font-size: 1.1rem;
            color: var(--text-color);
            white-space: pre-line;
            text-align: justify;
        }

        .nav-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        @media (max-width: 480px) {
            .nav-controls .btn {
                width: 100%;
                margin-bottom: 5px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 1) სათაური და 2) ლოზუნგი -->
    <header id="mainHeader">
        <h1>IT-ის ფაკულტეტი</h1>
        <div class="slogan">ვირჩევთ მომავალს!</div>
    </header>

    <!-- 3) ასარჩევი ზონა სპეციალიზაციებიდან და აღწერის სექციებიდან -->
    <div class="selection-zone" id="selectionZone">
        <!-- სპეციალიზაციები -->
        <div class="panel">
            <h3>ავირჩიოთ სპეციალიზაციებიდან გასაცნობად!</h3>
            <label class="all-toggle">
                <input type="checkbox" id="allSpecs" onchange="toggleAll('specs')"> ყველა
            </label>
            <div class="checkbox-group" id="specsGroup">
                <!-- დინამიკურად შეივსება JS-ით მოკლე სახელების პრინციპით -->
            </div>
        </div>

        <!-- სექციები -->
        <div class="panel">
            <h3>ავირჩიოთ სპეციალიზაციების აღწერებიდან!</h3>
            <label class="all-toggle">
                <input type="checkbox" id="allSections" onchange="toggleAll('sections')"> ყველა სექცია
            </label>
            <div class="checkbox-group" id="sectionsGroup">
                <!-- დინამიკურად შეივსება JS-ით -->
            </div>
        </div>
    </div>

    <!-- 4) გაცნობის დასაწყებად ღილაკი -->
    <div class="action-zone" id="actionZone">
        <button class="btn" onclick="startPresentation()">„აბა ვნახოთ!“</button>
    </div>

    <!-- პრიორიტეტის დასაზუსტებელი მოდალური ფანჯარა -->
    <div class="modal" id="priorityModal">
        <div class="modal-content">
            <h4>პრიორიტეტულად განვიხილოთ:</h4>
            <div class="modal-btns">
                <button class="btn" onclick="setPriority('specs')">სპეციალიზაციები</button>
                <button class="btn btn-alt" onclick="setPriority('sections')">აღმწერი სექციები</button>
            </div>
        </div>
    </div>

    <!-- 5) საპრეზენტაციო ეკრანი -->
    <div class="presentation-zone" id="presentationZone">
        <div class="view-card">
            <div class="view-title-box">
                <!-- 2 კომპონენტიანი სათაური მოკლე ფორმატში, სრული ვერსიის Tooltip-ით -->
                <div class="tooltip">
                    <h2 class="view-title-short" id="pageTitle">სათაური</h2>
                    <span class="tooltiptext" id="pageTitleFull">სრული სათაური</span>
                </div>
            </div>
            <div class="view-content-text" id="pageContent">
                აქ გამოჩნდება აღწერის ტექსტი...
            </div>
        </div>

        <!-- ნავიგაციის ღილაკები -->
        <div class="nav-controls">
            <button class="btn btn-alt" id="prevBtn" onclick="navigate(-1)">„წინა აღწერა“</button>
            <button class="btn" id="resetBtn" onclick="resetApp()">„ავირჩიოთ თავიდან“</button>
            <button class="btn" id="nextBtn" onclick="navigate(1)">„შემდეგი აღწერა“</button>
        </div>
    </div>
</div>

<script>
    // მონაცემთა ბაზა ფაილიდან „! IT-ფაკულტეტის სპეციალიზაციების დახასიათება (7 სექციანი).docx“
    const specialtiesData = {
        "DS": {
            short: "DS",
            full: "DS (Data Science) — მონაცემთა მეცნიერება",
            sections: {
                1: "მე ვარ მონაცემთა მეცნიერი — ვმუშაობ დაუმუშავებელ, ხშირად ქაოტურ მონაცემებთან და მათგან გამოვყოფ ნიმუშებს, რომლებიც ბიზნესსა ან საზოგადოებას რეალურ გადაწყვეტილებებში ეხმარება. ჩემი იარაღია სტატისტიკა, მანქანური სწავლება და დიდი მონაცემების დამუშავების ტექნოლოგიები.\nმარტივად: მე „გადავთარგმნი“ რიცხვებს ისეთ ისტორიად, რომელსაც ორგანიზაცია გადაწყვეტილებების მისაღებად გამოიყენებს.",
                2: "ცენტრალური კითხვა: რა ამბავს მოგვითხრობს ერთი შეხედვით ქაოტური მონაცემები და როგორ ავაგო მოდელი, რომელიც მომავალს იწინასწარმეტყველებს?\nშედარებითი პოზიციონირება: IS&BT-ს სტუდენტისგან განსხვავებით, რომელიც ბიზნეს პროცესს აწესრიგებს არსებული სისტემების დონეზე, DS-ის სტუდენტს არ აკმაყოფილებს არსებული პროცესები, აანალიზებს და მონაცემებიდან ახალ ცოდნას აგენერირებს, ქმნის მოდელს სისტემის სრულყოფისთვის. თანამედროვე ეტაპზე AI/LLM აგენტებსა და AutoML ხელსაწყოებს შეუძლიათ მონაცემთა საძიებო ანალიზი (EDA — Exploratory Data Analysis) და მოდელის შერჩევის ავტომატიზაცია, რის გამოც DS-ის სტუდენტის ღირებულება სულ უფრო გადადის ჰიპოთეზის ფორმულირებაზე, მონაცემთა ხარისხის კრიტიკულ შეფასებაზე და მიზეზ-შედეგობრივი დასკვნის გამოტანაზე.",
                3: "ძირეული ამოცანები: მონაცემთა „დასუფთავება“ და ანალიზისთვის მომზადება, სტატისტიკური ანალიზი, მანქანური სწავლების მოდელების შემუშავება და ვალიდაცია, შედეგების ვიზუალიზაცია გადაწყვეტილების მიმღებებისთვის.\nგაფართოებული ამოცანები: დიდი მონაცემების (Big Data) დამუშავების არქიტექტურები, ღრმა სწავლება (Deep Learning) რთული ნიმუშების ამოცნობისთვის, A/B ტესტირება და მიზეზობრივი დასკვნა (causal inference) ბიზნეს გადაწყვეტილებებში. აგრეთვე კოდირების AI-ასისტენტების (მაგ. Claude Code, OpenAI Сodex ან ანალოგების) გამოყენება მონაცემთა დასუფთავების, მათი თავისებურების (feature) გენერირებისა და ანალიზის ავტომატიზაციისთვის, ასევე LLM-ზე დაფუძნებული ანალიტიკური აგენტების ორქესტრირება რთული, მრავალეტაპიანი კვლევითი სამუშაოსთვის.\nსისტემური კონტექსტი: DS-ის სპეციალისტი მუშაობს პროდუქტის, ანალიტიკის ან კვლევის გუნდის ნაწილად — მისი მუშაობის შედეგები კვებავს ბიზნეს სტრატეგიის, საინჟინრო გუნდის ან მკვლევართა ჯგუფის გადაწყვეტილებებს.",
                4: "საქმიანობის ტიპი: DS-ის სპეციალისტი იკვლევს და აანალიზებს — ის მუშაობს ჰიპოთეზის ფორმულირებიდან მის ემპირიულ შემოწმებამდე.\nაზროვნების ტიპი: ალბათური და სტატისტიკური აზროვნება — ყოველი დასკვნა ხასიათდება გაურკვევლობით, რომელსაც DS-ის სპეციალისტი ციფრებში ზომავს და ანგარიშგებაში გამჭვირვალედ წარმოაჩენს. AI-ხელსაწყოების გავრცელებასთან ერთად მზარდი მნიშვნელობა ენიჭება შეფასებით აზროვნებას — AI-ის მიერ გენერირებული მოდელის თუ დასკვნის სტატისტიკური სანდოობის, მიკერძოების (bias) და მცდარი/ჰალუცინირებული (hallucinated) დასკვნების კრიტიკული გადამოწმების უნარს.",
                5: "მანქანური სწავლების (ML) მოდელი ან მოდელების ნაკრები პროცესების იმიტაციისთვის; ანალიტიკური პანელი (dashboard) ან ანგარიში, რომელიც ბიზნეს გადაწყვეტილებას ამყარებს; მონაცემთა დამუშავების კონვეიერი (pipeline), რომელიც “ნედლ” მონაცემებს გამორჩეული (extraction) სახით და გამოსადეგ ფორმატში გარდაქმნის.",
                6: "საწყისი წერტილი: DS-ის სპეციალისტს აბარებენ ბიზნესის კვლევით ამოცანებს და ხშირად დაუმუშავებელ („ნედლ“), არასტრუქტურირებულ მონაცემებს.\nსაბოლოო წერტილი: ის გადასცემს ვალიდირებულ (შემოწმებულ) მოდელს, დასკვნას ან ვიზუალიზებულ ანგარიშს, რომელზეც გადაწყვეტილების მიმღები პერსონა ან ინჟინერი დააფუძნებს შემდეგ ნაბიჯებს.\nპასუხისმგებლობის ცენტრი: მონაცემებზე დაფუძნებული დასკვნის სიზუსტე და სანდოობა — DS-ის სპეციალისტი პირადად აგებს პასუხს იმაზე, რომ მის მიერ აგებული მოდელების შედეგებს და რჩევებს შეცდომაში არ შეყავდეს გადაწყვეტილების მიმღები.",
                7: "ტიპიური პოზიციები: Junior Data Analyst/Junior Data Scientist-დან Mid Data Scientist-მდე, შემდეგ Senior, Lead და Staff/Principal დონეებამდე — ასევე სპეციალიზებული როლები: Machine Learning Engineer, Data Engineer და Research Scientist.\nინდუსტრიები და კონტექსტები: საფინანსო სექტორი, ჯანდაცვა, ელექტრონული კომერცია, მარკეტინგი, ლოგისტიკა და სამეცნიერო კვლევები.\nგანვითარების ტრაექტორია: Junior დონეზე მთავარი ამოცანაა მონაცემთა მომზადება და ბაზისური ანალიზი; AutoML-ისა და AI-ანალიტიკური ასისტენტების გავრცელებასთან ერთად, აქცენტი თანდათან გადადის ჰიპოთეზის ფორმულირებასა და AI-გენერირებული შედეგების კრიტიკულ შეფასებაზე. Mid-level ეტაპზე სტუდენტი დამოუკიდებლად ატარებს კვლევას ბოლომდე; Senior და მეტადრე Lead დონეზე იღებს მეთოდოლოგიურ გადაწყვეტილებებს; შემდგომში კარიერა იშლება ტექნიკურ ექსპერტიზაში ან მენეჯერულ მიმართულებაში."
            }
        },
        "IS&BT": {
            short: "IS&BT",
            full: "IS&BT (Information Systems & Business Tech) — ინფორმაციული სისტემები და ბიზნეს ტექნოლოგიები",
            sections: {
                1: "მე ვარ ხიდი ბიზნესსა და ტექნოლოგიას შორის — ვაანალიზებ, როგორ მუშაობს ორგანიზაცია და ვაგებ ან ვაწესრიგებ ციფრულ სისტემებს, რომლებიც მის პროცესებს მართავენ. ჩემი სამუშაოა ERP, CRM და სხვა არსებული კორპორაციული სისტემების კონფიგურირება, ინტეგრირება და მართვა. აგრეთვე ჩემი სამუშაოა ახალი პროგრამული პროდუქტის ინიციირება ორგანიზაციის საკეთილდღეოდ.\nმარტივად: მე ვაქცევ ბიზნესის ამოცანებს მოწესრიგებულ ციფრულ სისტემად.",
                2: "ცენტრალური კითხვა: როგორ უნდა მოეწყოს არსებული ბიზნეს პროცესი ციფრულ სისტემაში, რომ ის ეფექტური, მართვადი და მასშტაბირებადი იყოს?\nშედარებითი პოზიციონირება: SE-ის სტუდენტისგან განსხვავებით, რომელიც ახალ პროგრამულ პროდუქტს აგებს ნულიდან, IS&BT-ის სტუდენტი ხშირად მუშაობს მზა კორპორაციულ სისტემებთან (ERP, CRM) — მისი ფოკუსია არა კოდირება, არამედ პროცესების მოდელის დაზუსტება. DS-ის სტუდენტისგან განსხვავებით, აქცენტი არ არის მონაცემებიდან ახალი ცოდნის გამოყვანაზე. თანამედროვე კორპორაციული სისტემები თავადვე იყენებენ ჩაშენებულ AI აგენტებს (Microsoft Dynamics Copilot, Salesforce Agentforce, SAP Joule) — შესაბამისად, IS&BT-ის სპეციალისტის ამოცანაა ამ ჩაშენებული AI ფუნქციების ბიზნეს ლოგიკასთან შეფარდების კონტროლი.",
                3: "ძირეული ამოცანები: ბიზნესის მხარესგან მოთხოვნების შეგროვება, ბიზნეს პროცესების მოდელების მომზადება იმპლემენტაციისთვის, ERP/CRM სისტემების კონფიგურირება და ინტეგრირება, ადამიან-კომპიუტერის ურთიერთქმედების და სამომხმარებლო გამოცდილების (HCI/UX) დიზაინის შექმნა, მოთხოვნების „თარგმნა“ ტექნიკური გუნდისთვის.\nგაფართოებული ამოცანები: კომპანიის IT პროექტების მენეჯმენტი, არსებული სისტემის ციფრული ტრანსფორმაციის სტრატეგია, მონაცემთა მმართველობა (Data Governance) კორპორაციის დონეზე. აგრეთვე მოწინავე კომპანიაში/საწარმოში AI-ის გამოყენების მმართველობის (AI Governance) დანერგვა (Hyperautomation).\nსისტემური კონტექსტი: IS&BT-ის სპეციალისტი მუშაობს ორგანიზაციის IT და ბიზნეს განყოფილებების გადასაკვეთზე — მისი გადაწყვეტილებები პირდაპირ ეხება კომპანიის ოპერაციულ ეფექტურობას.",
                4: "საქმიანობის ტიპი: IS&BT-ის სპეციალისტი აანალიზებს და აპროექტებს — ის ბიზნეს მოთხოვნას სისტემურ გადაწყვეტაში გარდაქმნის.\nაზროვნების ტიპი: სისტემური აზროვნება — ორგანიზაცია ერთიან, ერთმანეთზე დამოკიდებულ პროცესთა ქსელად ესახება. სისტემაში AI აგენტების ჩასმასთან ერთად სისტემური აზროვნება მოიცავს იმასაც, თუ როგორ ცვლის ერთი ავტომატიზებული გადაწყვეტილება მთლიანი პროცესის ქცევას.",
                5: "IT პროექტის გეგმა ან ციფრული ტრანსფორმაციის სტრატეგია; კონფიგურირებული ან ინტეგრირებული კორპორაციული სისტემა (ERP/CRM); BPMN დიაგრამა; HCI/UX დიზაინის სქემა; ტექნიკური დავალება (Technical Specification), რომელსაც Software Engineer-ი იღებს პროგრამული უზრუნველყოფის შესაქმნელად.",
                6: "საწყისი წერტილი: IS&BT-ის სპეციალისტი ჩაიბარებს არაოპტიმალურ ბიზნეს პროცესებს ან მათ არაფორმალურ აღწერას და ბიზნეს მხარის მოთხოვნებს.\nსაბოლოო წერტილი: გადასცემს მუშა, კონფიგურირებულ სისტემას ან ტექნიკურ დავალებას ახალი პროგრამული პროდუქტის ასაგებად.\nპასუხისმგებლობის ცენტრი: ბიზნეს ლოგიკისა და ტექნოლოგიური გადაწყვეტის შესაბამისობა — ის პირადად აგებს პასუხს იმაზე, რომ სისტემა ნამდვილად ემსახურებოდეს ბიზნესის მიზანს.",
                7: "ტიპიური პოზიციები: Junior Business/Systems Analyst-დან Mid და Senior დონემდე, გადაწყვეტების არქიტექტორის (Solution Architect) და IT Manager/Director-ის როლებამდე. აგრეთვე: ERP/CRM Consultant, Product Owner.\nინდუსტრიები: საბანკო და დაზღვევის სექტორი, საცალო ვაჭრობა, წარმოება, საჯარო სექტორი და კონსალტინგური კომპანიები.\nგანვითარების ტრაექტორია: Junior დონეზე ძირეული ამოცანაა მოთხოვნების ანალიზი; AI-აგენტებით აღჭურვილ სისტემებში სტუდენტისგან სულ უფრო ადრე მოითხოვება ჩაშენებული AI ფუნქციების კონფიგურირება; Mid-level ეტაპზე გადადის პროექტების მართვაზე; Senior დონეზე — საწარმოს მასშტაბის არქიტექტურაზე."
            }
        },
        "SE": {
            short: "SE",
            full: "SE (Software Engineering) — პროგრამული უზრუნველყოფის ინჟინერია",
            sections: {
                1: "მე ვარ პროგრამული უზრუნველყოფის ინჟინერი (Software Engineer) — ვმუშაობ და ვქმნი პროგრამულ სისტემებს ნულიდან: ვიაზრებ დასმულ ამოცანას, ვაშენებ პროგრამულ კოდს და ვაბარებ პროდუქტს, რომელიც საიმედოდ მუშაობს რეალური დატვირთვის პირობებში.\nმარტივად: საზოგადოდ მიწოდებენ პროგრამისტს და მე ვაქცევ იდეას ან ტექნიკურ დავალებას მუშა პროგრამულ პროდუქტად.",
                2: "ცენტრალური კითხვა: როგორ ავაგო პროგრამული სისტემა, რომელიც სწორად მუშაობს, მოხერხებულია მომხმარებლისთვის, მასშტაბირებადია, კითხვადია ჩემი კოლეგებისთვის და მომავალში ადვილად გასაუმჯობესებელი?\nშედარებითი პოზიციონირება: IS&BT-ის სტუდენტისგან განსხვავებით, SE-ის სტუდენტი დასმული ამოცანიდან გამომდინარე წერს კოდს ან ავალებს ამას AI-ის ასისტენტს და ქმნის მუშა პროგრამულ პროდუქტს ნულიდან. Infra-ს სტუდენტისგან განსხვავებით, მას ფოკუსი არა ინფრასტრუქტურის მორგებაზე, არამედ საკუთრივ აპლიკაციის არქიტექტურასა და კოდის ხარისხზე აქვს.",
                3: "ძირეული ამოცანები: პროგრამული პროდუქტის დაპროექტება, კოდირების AI-ასისტენტების ეფექტურად გამოყენება, მუშა კოდის მიღება და კოდის განხილვაში (Code Review) ჩართულობა, ვებ და მობილური აპლიკაციების დეველოპმენტი, ავტომატური ტესტირება.\nგაფართოებული ამოცანები: მასშტაბური სისტემების არქიტექტურა, DevOps პრაქტიკები (CI/CD), მემკვიდრეობითი სისტემების რეფაქტორინგი, ასევე AI-ასისტენტებისთვის დავალების პროფესიონალურად ფორმულირება და კოდის ინტეგრაცია.\nსისტემური კონტექსტი: SE-ის სპეციალისტი მუშაობს დეველოპერული გუნდის ნაწილად, ხშირად იღებს IS&BT-ის ჯგუფის ტექნიკურ დავალებას, ხოლო მისი კოდი საბოლოოდ მომხმარებლის ხელში ხვდება.",
                4: "საქმიანობის ტიპი: SE-ის სპეციალისტი აშენებს — ის აბსტრაქტულ მოთხოვნას კონკრეტულ, მომუშავე სისტემად აქცევს.\nაზროვნების ტიპი: ლოგიკური და სტრუქტურული აზროვნება — პრობლემა იშლება მცირე ლოგიკურ ბლოკებად. AI კოდის ასისტენტების ეპოქაში მზარდი მნიშვნელობა ენიჭება შეფასებით (evaluative) აზროვნებას — გენერირებული კოდის უსაფრთხოების და არქიტექტურული მართებულობის კრიტიკულად გადამოწმებას.",
                5: "პროგრამული არქიტექტურის დიზაინის დოკუმენტი; მუშა, დატესტილი კოდი ან ვებ/მობილური აპლიკაცია; ავტომატური ტესტების კრებული; CI/CD pipeline, რომელიც კოდის დეპლოიმენტს ავტომატიზებს.",
                6: "საწყისი წერტილი: Software Engineer ჩაიბარებს ტექნიკურ დავალებას ან მოთხოვნების სპეციფიკაციას.\nსაბოლოო წერტილი: ის გადასცემს დატესტილ და მუშა პროგრამულ სისტემას, რომელიც მზადაა DevOps/Infra-სთვის.\nპასუხისმგებლობის ცენტრი: კოდის სიწმინდე და საიმედოობა — ის პირადად აგებს პასუხს იმაზე, რომ პროგრამულმა სისტემამ კორექტულად იმუშაოს და არ მოხდეს მისი ავარიული დასრულება სამუშაო გარემოში.",
                7: "ტიპიური პოზიციები: Junior Software Developer-დან Senior-მდე, Tech Lead, Engineering Manager და Staff/Principal Engineer დონეებამდე. ასევე: Full-Stack, Backend, Frontend და Mobile Developer.\nინდუსტრიები: FinTech, HealthTech, ელექტრონული კომერცია, ტელეკომი, თამაშების ინდუსტრია და საჯარო სექტორი.\nგანვითარების ტრაექტორია: პირველ 1-2 წელში ხელით კოდის წერის ნაცვლად, აქცენტი მეტად გადადის AI ასისტენტების მიერ შემოთავაზებული გადაწყვეტების გააზრებაზე; 2-4 წელში მუშაობს დამოუკიდებლად; 4-7 წელში იღებს არქიტექტურულ გადაწყვეტილებებს. AI-ის ეპოქაში შრომით ბაზარზე ცვლილებების შესაძლებლობაც იზრდება."
            }
        },
        "Infra": {
            short: "Infra",
            full: "Infra (IT Networks & Infrastructure) — ინფოტექნოლოგიების ქსელები და ინფრასტრუქტურა",
            sections: {
                1: "მე ვარ ინფრასტრუქტურის ინჟინერი — ვაგებ და ვმართავ იმ ტექნიკურ ფუძეს (ქსელები, სერვერები, Cloud რესურსები), რომელზეც ყველა სხვა სისტემა დგას. ჩემი მთავარი ამოცანაა, რომ ეს ფუძე ყოველთვის ხელმისაწვდომი და მასშტაბირებადი იყოს.\nმარტივად: მე ვაგებ პირობითად „ისეთ გზებსა და ხიდებს“, რომლებზეც ყველა სახის პროგრამული სისტემა მოძრაობს.",
                2: "ცენტრალური კითხვა: როგორ ავაგო და შევინარჩუნო ინფრასტრუქტურა, რომელიც ხარვეზის გარეშე, უსაფრთხოდ და მასშტაბირებადად აწვდის რესურსს ყველა ლეგალურ სისტემას?\nშედარებითი პოზიციონირება: Cyber-ის სტუდენტისგან განსხვავებით, Infra-ს სტუდენტი ფოკუსირებულია საკუთრივ ინფრასტრუქტურის აშენებაზე, ექსპლუატაციასა და ხელმისაწვდომობაზე — უსაფრთხოება მისთვის ერთ-ერთი ასპექტია ბევრს შორის. თუმცა, AIOps-ის გავრცელებასთან ერთად, მისთვის მნიშვნელოვან უნარად ყალიბდება AI-გენერირებული რეკომენდაციების სისწორის შეფასება.",
                3: "ძირეული ამოცანები: ქსელების დაგეგმვა და კონფიგურირება (Cisco CCNA დონე), სერვერების კონფიგურირება და Linux ადმინისტრირება, Cloud რესურსების მართვა (AWS, Azure).\nგაფართოებული ამოცანები: Cloud სერვისის მოდელების (IaaS/PaaS/SaaS) დონეზე არქიტექტურა, ვირტუალიზაცია, ინფრასტრუქტურა როგორც კოდი (IaC), მაღალი ხელმისაწვდომობის (High Availability) და კატასტროფისგან აღდგენის (Disaster Recovery) სქემები. AIOps პლატფორმების ამუშავება ანომალიების აღმოჩენისთვის.\nსისტემური კონტექსტი: მუშაობს IT ოპერაციების გუნდში — მისი მოღვაწეობა ფუნდამენტს ქმნის Software Engineer-ის აპლიკაციების მუშაობისთვის.",
                4: "საქმიანობის ტიპი: Infra-ს სპეციალისტი აშენებს და მართავს — ქმნის სისტემის ფუნქციონირების ფიზიკურ ან ვირტუალურ ფუძეს.\nაზროვნების ტიპი: სისტემური და პროცედურული აზროვნება — ყოველი კომპონენტი განიხილება ერთიანი მექანიზმის ნაწილად. ამასთან, ემატება ვალდებულება, რომ AI-გენერირებული განგაშები კრიტიკულად გადამოწმდეს ცრუ-დადებითი შემთხვევების გამოსარიცხავად.",
                5: "კონფიგურირებული სერვერი და მუშა ქსელური ან Cloud ინფრასტრუქტურა; ინფრასტრუქტურის როგორც კოდის (IaC) სკრიპტები; მონიტორინგისა და განგაშის სისტემა; კატასტროფისგან აღდგენის გეგმა და დოკუმენტაცია.",
                6: "საწყისი წერტილი: ჩაიბარებს მოთხოვნას სისტემის ან აპლიკაციის ასამუშავებლად საჭირო რესურსებზე.\nსაბოლოო წერტილი: გადასცემს მზა, კონფიგურირებულ სერვერსა და მუშა გარემოს, სადაც პროგრამა სტაბილურად იმუშავებს.\nპასუხისმგებლობის ცენტრი: სისტემის ხელმისაწვდომობა (Uptime) — ის პირადად აგებს პასუხს იმაზე, რომ ინფრასტრუქტურა არ ჩავარდეს.",
                7: "ტიპიური პოზიციები: Junior System/Network Administrator-დან DevOps/System Engineer-მდე, Senior DevOps/SRE, Infrastructure Architect და Head of Infrastructure. ასევე: Cloud Engineer, SRE.\nინდუსტრიები: ტელეკომი, ღრუბლოვანი პროვაიდერები, ფინტექი, ელექტრონული კომერცია და მსხვილი კორპორაციები.\nგანვითარების ტრაექტორია: Junior დონეზე მთავარია მონიტორინგი; AIOps-ის გავრცელებასთან ერთად, მოეთხოვება root-cause ანალიზი; Mid-level ეტაპზე წერს IaC-ს; Senior დონეზე — მუშაობს მასშტაბირების არქიტექტურაზე."
            }
        },
        "Cyber": {
            short: "Cyber",
            full: "Cyber (CyberSecurity) — კიბერუსაფრთხოება",
            sections: {
                1: "მე ვარ კიბერუსაფრთხოების სპეციალისტი — ერთადერთი ინჟინერი ვარ, ვინც სისტემას ერთდროულად ორი კუთხით ხედავს: მცველის და თავდამსხმელის. ჩემი ამოცანაა სისტემის სუსტი წერტილი მანამდე ვიპოვო, სანამ მას სხვა გამოიყენებს.\nმარტივად: მე ვფიქრობ როგორც თავდამსხმელი, რათა ავაგო დაცვა, რომელსაც ჰაკერი ვერ გადალახავს.",
                2: "ცენტრალური კითხვა: სად არის არსებული სისტემის სუსტი წერტილი, რომელსაც მოწინააღმდეგე გამოიყენებს, და როგორ ავაგო დაცვა მის წინააღმდეგ?\nშედარებითი პოზიციონირება: Infra-ს სპეციალისტისგან განსხვავებით, Cyber-ის სტუდენტი ვარაუდობს, რომ ინფრასტრუქტურა აქტიური თავდასხმის ობიექტი იქნება — მისი მოქმედება შეჯიბრებითია. დღეს უკვე მოწინააღმდეგეც ხშირად იყენებს AI-ს (AI-გენერირებული ფიშინგი, სკანირება), ამიტომ Cyber-ის სტუდენტმა უნდა გაითვალისწინოს დაცვის AI მეთოდები.",
                3: "ძირეული ამოცანები: სისუსტეების სკანირება და შეფასება, წვდომის კონტროლისა და ავთენტიფიკაციის კონფიგურირება, უსაფრთხოების ინციდენტების მონიტორინგი.\nგაფართოებული ამოცანები: პენტესტინგი (Ethical Hacking), კრიპტოგრაფიული სისტემების დიზაინი, ინციდენტებზე რეაგირება და ციფრული კრიმინალისტიკა (Forensics). სულ უფრო მნიშვნელოვან ადგილს იკავებს AI სისტემების უსაფრთხოება (LLM Security) — prompt injection და jailbreak-ის წინააღმდეგ დაცვა.\nსისტემური კონტექსტი: უსაფრთხოების გუნდი იცავს Infra-ს და SE-ის მიერ შექმნილ სისტემებს მარეგულირებელ მოთხოვნებთან კავშირში.",
                4: "საქმიანობის ტიპი: Cybersecurity-ის სპეციალისტი იცავს — მუდმივად აფასებს საფრთხეს და აძლიერებს დაცვის ხაზს.\nაზროვნების ტიპი: დაპირისპირებითი (adversarial) აზროვნება — ყოველი სისტემა განიხილება იმ კუთხით, თუ როგორ შეიძლება მისი ბოროტად გამოყენება. ეს ვრცელდება AI სისტემებზეც. თუმცა მაინც ნუ დავიჯერებთ, რომ „ამ სპეციალიზაციას ირჩევს ის, ვისთვისაც პარანოია პროფესიული სათნოებაა“.",
                5: "სისუსტეების შეფასების ანგარიში (Vulnerability Assessment Report); პენტესტის შედეგების დოკუმენტი; დაცვის კონფიგურირება (firewall წესები, წვდომის პოლიტიკა); ინციდენტზე რეაგირების ანგარიში და ფორენზიკის დასკვნა.",
                6: "საწყისი წერტილი: ჩაიბარებს მუშა სისტემას ან ინფრასტრუქტურას, რომლის უსაფრთხოების დონე გასაზომი და გასაძლიერებელია.\nსაბოლოო წერტილი: გადასცემს დაცვის ხარისხის შეფასებას, გამოვლენილ სისუსტეებს და კონკრეტულ რეკომენდაციებს.\nპასუხისმგებლობის ცენტრი: სისტემის გადარჩენადობა (Resilience) მოწინააღმდეგის წინაშე — ის პასუხისმგებელია, რომ შემოტევა დროულად იქნება შეკავებული.",
                7: "ტიპიური პოზიციები: Junior SOC Analyst-დან Mid Security Engineer-მდე, Senior, Security Architect და CISO დონეებამდე. ასევე: Penetration Tester, Incident Responder, AI/LLM Security Specialist.\nინდუსტრიები: საბანკო სექტორი, სამთავრობო და თავდაცვითი სტრუქტურები, ჯანდაცვა, ტელეკომი და აუდიტორული კომპანიები.\nგანვითარების ტრაექტორია: Junior დონეზე ძირეული ამოცანაა მონიტორინგი; LLM Security-ის გამო, სტუდენტისგან ადრეულად მოითხოვება ორმხრივი აზროვნება; Mid-level ეტაპზე ახდენს საფრთხის მოდელირებას; Senior დონეზე — საწარმოს მასშტაბის უსაფრთხოების არქიტექტურას."
            }
        },
        "CE": {
            short: "CE",
            full: "CE (Computer Engineering) — კომპიუტერული ინჟინერია",
            sections: {
                1: "მე ვარ კომპიუტერული ინჟინერი — ვმუშაობ იქ, სადაც პროგრამული უზრუნველყოფა შეხვდება ფიზიკურ მოწყობილობას. ვაკონფიგურირებ სერვერის აპარატურულ/პროგრამულ უზრუნველყოფას კომპანიების პრობლემებიდან გამომდინარე. ვაგებ ჩაშენებულ (embedded) სისტემებს და ჭკვიანი მოწყობილობების IoT-ეკოსისტემებს. ჩემი ცოდნა ერთნაირად მოიცავს ელექტრონიკას და კოდს.\nმარტივად: მე ვღებულობ ოპტიმალურ ტექნიკურ გადაწყვეტილებებს და ვაძლევ \"ინტელექტს\" ფიზიკურ მოწყობილობებს.",
                2: "ცენტრალური კითხვა: როგორ ავაწყო კომპანიების ოპტიმალური კომპიუტერული კომპლექსი ან როგორ ავაგო სისტემა, რომელიც ფიზიკური რესურსების (ენერგია, მეხსიერება) მკაცრი შეზღუდვის პირობებში ამუშავდება?\nშედარებითი პოზიციონირება: SE-ის სტუდენტისგან განსხვავებით, რომელიც მუშაობს გარემოში, სადაც რესურსები ნაკლებად შეზღუდულია, CE მუშაობს მკაცრ ჩარჩოებში. R&A-ისგან განსხვავებით, ფოკუსი აქ არ არის მექანიკურ მოძრაობაზე, არამედ ჩიპის დონის პროგრამულ-აპარატურულ ინტეგრაციაზე. AI-აქსელერატორების (NPU/TPU) ეპოქაში, შეზღუდვა გულისხმობს AI მოდელის ჩიპებზე გაშვების ოპტიმიზაციას.",
                3: "ძირეული ამოცანები: სერვერების აპარატურულ/პროგრამული უზრუნველყოფის კონფიგურირება, ჩაშენებული სისტემების პროგრამირება (firmware), მიკროკონტროლერების კონფიგურირება, სენსორებთან ინტერფეისის შექმნა.\nგაფართოებული ამოცანები: კომპიუტერული კომპლექსის დაპროექტება, აპარატურის დიზაინი, სიგნალების ციფრული დამუშავება (DSP), „ჭკვიანი სახლის“ აგება, Edge AI მოდელების ოპტიმიზაცია (quantization და pruning). ასევე AI-ის გამოყენება ჩიპის/firmware-ის დაპროექტებაში (Synopsys.ai).\nსისტემური კონტექსტი: ნაშრომი ინტეგრირდება კომპლექსურ პროექტში ან ფიზიკურ მოწყობილობაში — ავტომობილი, IoT სენსორი, სამედიცინო აპარატურა.",
                4: "საქმიანობის ტიპი: CE-ის სპეციალისტი აპროექტებს და აშენებს — ის ერთდროულად მუშაობს პროგრამული ლოგიკისა და ფიზიკური აპარატურის საზღვარზე.\nაზროვნების ტიპი: რესურსზე ორიენტირებული, ზუსტი ინჟინერული აზროვნება — ყოველი გადაწყვეტილება ფასდება ტექნიკის, ენერგიის, მეხსიერებისა და დროის მკაცრი ბალანსით.",
                5: "ჩაშენებული სისტემის firmware ან კონტროლერის კოდი; აპარატურულ-პროგრამული ინტეგრაციის სქემა; ოპტიმიზებული AI მოდელი, რომელიც ჩიპზე ამუშავდება; ტექნიკური დოკუმენტაცია მოწყობილობის არქიტექტურაზე.",
                6: "საწყისი წერტილი: ჩაიბარებს სისტემის ტექნიკურ პირობებს, აპარატურის სპეციფიკაციას ან მოწყობილობის ფუნქციურ მოთხოვნებს.\nსაბოლოო წერტილი: გადასცემს საპროექტო დოკუმენტაციას, firmware-ს ან ჩაშენებულ სისტემას, რომელიც მზადაა მასობრივი წარმოებისთვის.\nპასუხისმგებლობის ცენტრი: დამკვეთის მოთხოვნების შესრულება და საიმედოობა ფიზიკური შეზღუდვების პირობებში — ის პასუხისმგებელია კომპლექსის გამართულ მუშაობაზე.",
                7: "ტიპიური პოზიციები: Junior Hardware/Embedded Engineer-დან Mid, Senior, Hardware Architect და Head of Hardware Engineering დონემდე. როლები: Firmware Engineer, IoT Engineer, FPGA/ASIC Engineer.\nინდუსტრიები: ელექტრონული პროდუქციის მწარმოებლები, ავტომობილების ინდუსტრია, IoT, სამედიცინო აპარატურა და Semiconductor კომპანიები.\nგანვითარების ტრაექტორია: Junior დონეზე მთავარია ტესტირება და დებაგინგი; Mid-level ეტაპზე ახდენს სისტემის დიზაინს და AI-მოდელების ოპტიმიზაციას; Senior დონეზე — მუშაობს პროდუქტის არქიტექტურულ გადაწყვეტილებებზე."
            }
        },
        "R&A": {
            short: "R&A",
            full: "R&A (Robotics & Automation) — რობოტები და ავტომატიზაცია",
            sections: {
                1: "მე ვარ რობოტიკისა და ავტომატიზაციის ინჟინერი — ვაგებ სისტემებს, რომლებიც ფიზიკურ სამყაროში მოძრაობენ, აანალიზებენ გარემოს და მოქმედებენ ადამიანის უწყვეტი ჩარევის გარეშე. ჩემი სამუშაოა რობოტების პროგრამირება, ინდუსტრიული პროცესების ავტომატიზაცია და გარემოს აღქმის სისტემები.\nმარტივად: მე ვაგებ „მექანიზმებს“, რომლებსაც საკუთარი თავის მართვა შეუძლიათ.",
                2: "ცენტრალური კითხვა: როგორ ავაგო სისტემა ან გავაწყო მექანიზმი, რომელიც ფიზიკურ გარემოს აღიქვამს, გადაწყვეტილებას იღებს და ზუსტად მოქმედებს რეალურ დროში?\nშედარებითი პოზიციონირება: CE-ის სტუდენტისგან განსხვავებით, რომელიც ფოკუსირებულია ჩიპის არქიტექტურაზე, R&A ფოკუსირებულია მთლიან სისტემაზე, რომელიც ფიზიკურ სამყაროსთან ურთიერთქმედებს. DS-ისგან განსხვავებით, აქცენტია მოდელის ფიზიკურ ქმედებად გარდაქმნა. თანამედროვე მიდგომებში ეს არის Vision-Language-Action (VLA) მოდელები, რომლებიც ხედვას და ფიზიკურ მოქმედებას ერთ სისტემაში აერთიანებენ.",
                3: "ძირეული ამოცანები: რობოტების პროგრამირება (Robot Operating System — ROS), ინდუსტრიული კონტროლერების (PLC) პროგრამირება, სენსორული მონაცემების დამუშავება რეალურ დროში.\nგაფართოებული ამოცანები: SCADA სისტემების დიზაინი, Computer Vision ნავიგაციისთვის, ავტონომიური სისტემების კოორდინირება, ნივთების ინდუსტრიული ინტერნეტი (IIoT) და Industry 4.0. ფიზიკური სამყაროს AI მოდელების (Physical AI) გამოყენება ამოცანის დაგეგმვისთვის.\nსისტემური კონტექსტი: მუშაობს საწარმოო, ლოგისტიკურ ან კვლევით გარემოში, სადაც უსაფრთხოება და ზუსტი მოქმედება კრიტიკულია.",
                4: "საქმიანობის ტიპი: R&A-ის სპეციალისტი აპროექტებს და აშენებს — ის ქმნის სისტემას, რომელიც გარემოს აღქმიდან მოქმედებამდე უწყვეტ ციკლში მუშაობს.\nაზროვნების ტიპი: სისტემური და რეალურ დროში ორიენტირებული აზროვნება — ყოველი გადაწყვეტილება ფასდება ფიზიკური შეზღუდვების ფონზე. დამატებითი ყურადღება ეთმობა AI-ზე დაფუძნებული გადაწყვეტილების გადამოწმებას ფიზიკურ გარემოში გადატანამდე.",
                5: "დაპროგრამებული რობოტული სისტემა (საწარმოო ხაზი ან ავტონომიური პლატფორმა); PLC-ზე დაფუძნებული ავტომატიზაციის გადაწყვეტა; SCADA მონიტორინგისა და კონტროლის სისტემა; ინტეგრირებული Computer Vision მოდული.",
                6: "საწყისი წერტილი: ჩაიბარებს ფიზიკური ამოცანის ან საწარმოო პროცესის სპეციფიკაციას, რომელიც ავტომატიზაციას მოითხოვს.\nსაბოლოო წერტილი: გადასცემს მუშა, ტესტირებულ რობოტულ ან ავტომატიზებულ სისტემას, რომელიც მზადაა რეალურ გარემოში ინტეგრაციისთვის.\nპასუხისმგებლობის ცენტრი: სისტემის ფიზიკური უსაფრთხოება და სიზუსტე — ის პირადად აგებს პასუხს იმაზე, რომ ავტონომიური მოქმედება უსაფრთხოდ შესრულდება.",
                7: "ტიპიური პოზიციები: Junior Robotics/Automation Engineer-დან Mid, Senior, Robotics/Automation Architect და Head of Robotics დონეებამდე. როლები: Computer Vision Engineer, Controls Engineer, Industrial Automation Engineer.\nინდუსტრიები: წარმოება და ლოგისტიკა (Industry 4.0), ავტომობილების ინდუსტრია (ავტონომიური მართვა), სამედიცინო რობოტიკა, სოფლის მეურნეობა და თავდაცვა.\nგანვითარების ტრაექტორია: Junior დონეზე ახდენს ტესტირებას და კალიბრაციას; VLA მოდელების ეპოქაში მას მოეთხოვება ამ მოდელების გადამოწმება; Mid-level ეტაპზე ახდენს დამოუკიდებელ ინტეგრაციას; Senior დონეზე — იღებს საწარმოო ხაზის მასშტაბის არქიტექტურულ გადაწყვეტილებებს."
            }
        }
    };

    const sectionsInfo = {
        1: { short: "1.ვინ ვარ", full: "1. სპეციალიზაციის იდენტობა — «ვინ ვარ?»" },
        2: { short: "2.სხვაობა", full: "2. სპეციალიზაციის მთავარი განმასხვავებელი" },
        3: { short: "3.პრობლემები", full: "3. სპეციალისტის პრობლემური სივრცე" },
        4: { short: "4.ფიქრი&საქმე", full: "4. საქმიანობის ტიპი და აზროვნება" },
        5: { short: "5.პროდუქტი", full: "5. სპეციალისტის პროდუქტი" },
        6: { short: "6.მოვალეობა", full: "6. პასუხისმგებლობის ზონა" },
        7: { short: "7.კარიერა", full: "7. კარიერული პერსპექტივა" }
    };

    // სიების დინამიკური გენერირება ინტერფეისში
    function initUI() {
        const specsGroup = document.getElementById('specsGroup');
        const sectionsGroup = document.getElementById('sectionsGroup');

        for (let key in specialtiesData) {
            specsGroup.innerHTML += `
                <label class="checkbox-item tooltip">
                    <input type="checkbox" class="spec-checkbox" value="${key}"> ${specialtiesData[key].short}
                    <span class="tooltiptext">${specialtiesData[key].full}</span>
                </label>
            `;
        }

        for (let key in sectionsInfo) {
            sectionsGroup.innerHTML += `
                <label class="checkbox-item tooltip">
                    <input type="checkbox" class="section-checkbox" value="${key}"> ${sectionsInfo[key].short}
                    <span class="tooltiptext">${sectionsInfo[key].full}</span>
                </label>
            `;
        }
    }

    // "ყველა" ჩამრთველის ლოგიკა
    function toggleAll(type) {
        if (type === 'specs') {
            const isChecked = document.getElementById('allSpecs').checked;
            document.querySelectorAll('.spec-checkbox').forEach(cb => cb.checked = isChecked);
        } else {
            const isChecked = document.getElementById('allSections').checked;
            document.querySelectorAll('.section-checkbox').forEach(cb => cb.checked = isChecked);
        }
    }

    let selectedSpecs = [];
    let selectedSections = [];
    let presentationQueue = [];
    let currentIndex = 0;

    // აპლიკაციის დაწყების ძირითადი ფუნქცია
    function startPresentation() {
        selectedSpecs = Array.from(document.querySelectorAll('.spec-checkbox:checked')).map(cb => cb.value);
        selectedSections = Array.from(document.querySelectorAll('.section-checkbox:checked')).map(cb => parseInt(cb.value));

        if (selectedSpecs.length === 0 || selectedSections.length === 0) {
            alert("გთხოვთ აირჩიოთ მინიმუმ ერთი სპეციალიზაცია და მინიმუმ ერთი აღმწერი სექცია!");
            return;
        }

        // წესი ა) თუ ორივე სიიდან არჩეულია ერთზე მეტი ელემენტი, ვკითხულობთ პრიორიტეტს
        if (selectedSpecs.length > 1 && selectedSections.length > 1) {
            document.getElementById('priorityModal').style.display = 'flex';
        } else {
            // თუ პრიორიტეტის კითხვა საჭირო არაა, ნაგულისხმევად სპეციალიზაციების მიხედვით ვალაგებთ
            buildQueue('specs');
        }
    }

    // პრიორიტეტის დაყენება მოდალური ფანჯრიდან
    function setPriority(priority) {
        document.getElementById('priorityModal').style.display = 'none';
        buildQueue(priority);
    }

    // რიგის აგება არჩეული პრიორიტეტის შესაბამისად
    function buildQueue(priority) {
        presentationQueue = [];
        currentIndex = 0;

        if (priority === 'specs') {
            // ჯერ სპეციალიზაცია, მერე მისი სექციები
            selectedSpecs.forEach(spec => {
                selectedSections.forEach(sec => {
                    presentationQueue.push({ specKey: spec, sectionKey: sec });
                });
            });
        } else {
            // ჯერ სექციები, მერე სპეციალიზაციები
            selectedSections.forEach(sec => {
                selectedSpecs.forEach(spec => {
                    presentationQueue.push({ specKey: spec, sectionKey: sec });
                });
            });
        }

        // გადართვა საპრეზენტაციო ხედზე
        document.getElementById('selectionZone').style.display = 'none';
        document.getElementById('actionZone').style.display = 'none';
        document.getElementById('presentationZone').style.display = 'block';

        renderCurrentPage();
    }

    // მიმდინარე გვერდის/სექციის ეკრანზე გამოტანა
    function renderCurrentPage() {
        if (presentationQueue.length === 0) return;

        const currentItem = presentationQueue[currentIndex];
        const specInfo = specialtiesData[currentItem.specKey];
        const secInfo = sectionsInfo[currentItem.sectionKey];

        // წესი გ) 2 კომპონენტიანი სათაური მოკლე ვერსიით, სრულზე შეხებისას გამოჩენით
        const titleShort = `${specInfo.short} - ${secInfo.short}`;
        const titleFull = `${specInfo.full} | ${secInfo.full}`;

        document.getElementById('pageTitle').innerText = titleShort;
        document.getElementById('pageTitleFull').innerText = titleFull;
        
        // ტექსტური შინაარსის ჩატვირთვა
        document.getElementById('pageContent').innerText = specInfo.sections[currentItem.sectionKey];

        // ღილაკების აქტიურობის მართვა (წესი ბ)
        document.getElementById('prevBtn').disabled = (currentIndex === 0);
        document.getElementById('nextBtn').disabled = (currentIndex === presentationQueue.length - 1);
        
        // სტილისტურად დაბინდვა თუ ღილაკი გათიშულია
        document.getElementById('prevBtn').style.opacity = (currentIndex === 0) ? "0.5" : "1";
        document.getElementById('nextBtn').style.opacity = (currentIndex === presentationQueue.length - 1) ? "0.5" : "1";
        
        // ყოველ გადასვლაზე ვასქროლებთ ბარათის დასაწყისში
        document.querySelector('.view-card').scrollTop = 0;
    }

    // ნავიგაცია წინა/შემდეგ აღწერებზე
    function navigate(direction) {
        currentIndex += direction;
        if (currentIndex >= 0 && currentIndex < presentationQueue.length) {
            renderCurrentPage();
        }
    }

    // თავიდან არჩევის ფუნქცია (წესი ბ - „ავირჩიოთ თავიდან“)
    function resetApp() {
        document.getElementById('presentationZone').style.display = 'none';
        document.getElementById('selectionZone').style.display = 'grid';
        document.getElementById('actionZone').style.display = 'block';
    }

    // აპლიკაციის ინიციალიზაცია ჩატვირთვისას
    window.onload = initUI;
</script>
